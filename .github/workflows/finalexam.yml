name: FinalExam - Python
on:
  workflow_dispatch:
  push:
    paths:
      - 'finalexam/**'
      - '.github/workflows/finalexam.yml'
  pull_request:
    paths:
      - 'finalexam/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Check if lab file exists
        id: check_file
        run: |
          if [ -f "finalexam/finalexam.py" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run FinalExam tests
        if: steps.check_file.outputs.exists == 'true'
        run: |
          export PYTHONPATH="${PYTHONPATH}:finalexam"
          pytest finalexam/ -v

      - name: Lab file not found
        if: steps.check_file.outputs.exists == 'false'
        run: |
          echo "❌ finalexam/finalexam.py not found"
          echo "Create this file to start the lab"
          exit 1
